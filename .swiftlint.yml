excluded:
  - .build
  - tests          # repo-root tests/; SwiftFormat covers layout; strict SwiftLint rules conflict with test fixtures (Date/UUID literals, long manifests)

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - colon
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - discouraged_none_name
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - file_name_no_space
  - first_where
  - identical_operands
  - last_where
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - private_action
  - redundant_nil_coalescing
  - sorted_imports
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - line_length        # handled by SwiftFormat --maxwidth 120
  - todo               # we allow TODO comments in source
  - nesting            # deeply-nested closures are fine for actors

line_length:
  warning: 130
  error: 160

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length: 1
  excluded:
    - id
    - ok
    - db
    - ui

nesting:
  type_level:
    warning: 4

force_unwrapping: warning

custom_rules:
  no_magic_colors:
    name: "No Magic Colors"
    regex: 'Color\(red:|Color\(hue:|Color\(white:'
    message: "Use Theme.* tokens instead of literal colors."
    severity: warning

  no_date_direct:
    name: "No Direct Date()"
    regex: '\bDate\(\)'
    message: "Inject Clock seam instead of calling Date() directly."
    severity: warning

  no_uuid_direct:
    name: "No Direct UUID()"
    regex: '\bUUID\(\)'
    message: "Inject RandomSource seam instead of calling UUID() directly."
    severity: warning

  no_userdefaults:
    name: "No UserDefaults"
    regex: 'UserDefaults\.standard'
    message: "Use PrefsStore (via DI seam) instead of UserDefaults.standard directly."
    severity: error
